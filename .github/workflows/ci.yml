name: CI Pipeline

on:
  workflow_dispatch:

jobs:

  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
    
    - name: Code Checkout
      uses: actions/checkout@v4

    - name: Login Docker
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and Push Frontend Image
      working-directory: application/frontend
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/incidentzero-frontend:v1 .
        docker push ${{ secrets.DOCKER_USERNAME }}/incidentzero-frontend:v1
    - name: Build and Push Backend Image

      working-directory: application/backend
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/incidentzero-backend:v1 .
        docker push ${{ secrets.DOCKER_USERNAME }}/incidentzero-backend:v1

  iac-and-configuration:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:

      - name: Code Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2.0.3
        with:
          terraform-version: "1.18.0"
          terraform_wrapper: false

      - name: Configure Azure Creadentials
        uses: Azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Terraform Init
        working-directory: infra/main_infra
        run: terraform init

      - name: Terraform Plan
        working-directory: infra/main_infra
        run: terraform plan

      - name: Terraform Apply
        working-directory: infra/main_infra
        run: terraform apply --auto-approve

      - name: Get VM IP
        id: vm
        working-directory: infra/main_infra
        run: |
          echo "ip=$(terraform output -raw vm_public_ip)" >> "$GITHUB_OUTPUT"

      - name: Debug EC2 IP
        run: |
          echo "IP is: ${{ steps.vm.outputs.ip }}"

      # Install Ansible
      - name: Install Ansible
        run: |
            sudo apt update
            sudo apt install software-properties-common
            sudo add-apt-repository --yes --update ppa:ansible/ansible
            sudo apt install ansible

      - name: Configure SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AZURE_SSH_KEY }}" > ~/.ssh/azure_rsa.pem
          chmod 600 ~/.ssh/azure_rsa.pem

      - name: Generate Inventory
        run: |
          cat > ansible/inventory.ini <<EOF
          [servers]
          ${{ steps.vm.outputs.ip }}
          [servers:vars]
          ansible_user=${{secrets.ADMIN_USERNAME}}
          ansible_ssh_private_key_file=~/.ssh/azure_rsa
          ansible_python_interpreter=/usr/bin/python3
          ansible_ssh_common_args='-o UserKnownHostsFile=/dev/null -o StrictHostKeyChecking=no'
          EOF

      - name: Run Ansible Playbook
        working-directory: ansible/
        run: |
          export DATABASE_URL=${{secrets.DATABASE_URL}}
          ansible-playbook -i inventory.ini -v playbook.yml