name: CI Pipeline

on:
  workflow_dispatch:

jobs:

  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
    
    - name: Code Checkout
      uses: actions/checkout@v4

    # Required to use advanced caching backends like 'gha'
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4.2.0

    - name: Login Docker
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    
    # Frontend Build & Push with Cache
    - name: Build and Push Frontend Image
      uses: docker/build-push-action@v6
      with:
        context: ./application/frontend
        file: ./application/frontend/Dockerfile
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/incidentzero-frontend:v1
        cache-from: type=gha,scope=frontend
        cache-to: type=gha,mode=max,scope=frontend

    - name: Build and Push Backend Image
      uses: docker/build-push-action@v6
      with:
        context: ./application/backend
        file: ./application/backend/Dockerfile
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/incidentzero-backend:v1
        cache-from: type=gha,scope=backend
        cache-to: type=gha,mode=max,scope=backend

  infra-as-code:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:

      - name: Code Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2.0.3
        with:
          terraform-version: "1.18.0"
          terraform_wrapper: false

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init
        working-directory: infra/main_infra
        run: terraform init

      - name: Terraform Plan
        working-directory: infra/main_infra
        run: terraform plan -var="admin_username=${{secrets.ADMIN_USERNAME}}"

      - name: Terraform Apply
        working-directory: infra/main_infra
        run: terraform apply --auto-approve -var="admin_username=${{secrets.ADMIN_USERNAME}}"
